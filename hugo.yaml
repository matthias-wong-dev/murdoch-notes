baseURL: "https://murdochnotes.com/"
languageCode: "en-au"
title: "Murdoch Notes"
theme: "vortisil"
copyright: "Matthias Wong"
hasCJKLanguage: true
enableEmoji: true

taxonomies:
  tag: "tags"

pagination:
  pagerSize: 9

params:
  author: "Matthias Wong"
  defaultCover: "/assets/imgs/meta.png"
  logoImg: false
  logoInvert: false
  math: false
  comments:
    enabled: false
  meta:
    description: "Field observations on organisations, data, AI, and related questions in complex systems."

menus:
  main:
    - identifier: "home"
      url: "/"
      weight: 1
    - identifier: "about"
      url: "/about"
      weight: 2
    - identifier: "archives"
      url: "/posts"
      weight: 3

module:
  hugoVersion:
    extended: true
    min: "0.116.0"

markup:
  highlight:
    style: "evergarden"
    tabWidth: 4
    codeFences: true
    guessSyntax: true

outputs:
  home:
    - HTML
    - JSON